<link id="fa-stylesheet" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<footer class="site-footer h-card">
  <data class="u-url" value="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col">
        <p class="footer-heading">{{ site.title | escape }}</p>
      </div>

      <div class="footer-col">
        <div class="social-links">
          {% if site.github_username %}
          <a href="https://github.com/{{ site.github_username }}" style="margin-right: 16px; text-decoration: none; color: #0066cc;">
            <i class="fab fa-github"></i> GitHub
          </a>
          {% endif %}
          <a href="https://instagram.com/hn.poornima" style="text-decoration: none; color: #0066cc;">
            <i class="fab fa-instagram"></i> Instagram
          </a>
        </div>
      </div>

      <div class="footer-col">
        <p>{{ site.description | escape }}</p>
      </div>
    </div>
  </div>

</footer>
